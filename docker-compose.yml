services:
  server:
    build:
      context: ./backend
    container_name: reach-assignment-server
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://reach:reach@postgres:5432/reach
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    container_name: reach-assignment-postgres
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach -d reach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reach-postgres-data:/var/lib/postgresql/data

volumes:
  reach-postgres-data:
