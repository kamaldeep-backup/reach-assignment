services:
  postgres:
    image: postgres:16-alpine
    container_name: reach-assignment-postgres
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach -d reach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reach-postgres-data:/var/lib/postgresql/data

volumes:
  reach-postgres-data:
