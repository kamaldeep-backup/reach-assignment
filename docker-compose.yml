services:
  frontend:
    build:
      context: ./frontend
    container_name: reach-assignment-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:${SERVER_PORT:-8000}}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - reach-frontend-node-modules:/app/node_modules
    depends_on:
      - server

  server:
    build:
      context: ./backend
    container_name: reach-assignment-server
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://reach:reach@postgres:5432/reach
      CORS_ALLOW_ORIGINS: >-
        ${CORS_ALLOW_ORIGINS:-["http://localhost:${FRONTEND_PORT:-5173}","http://127.0.0.1:${FRONTEND_PORT:-5173}","http://0.0.0.0:${FRONTEND_PORT:-5173}"]}
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    container_name: reach-assignment-postgres
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach -d reach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reach-postgres-data:/var/lib/postgresql/data

volumes:
  reach-postgres-data:
  reach-frontend-node-modules:
